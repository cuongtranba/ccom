services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: inv
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inv}
      POSTGRES_DB: inv
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inv -d inv"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    expose:
      - "6379"

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "4400:4400"
    environment:
      - DATABASE_URL=postgresql://inv:${POSTGRES_PASSWORD:-inv}@postgres:5432/inv
      - REDIS_URL=redis://redis:6379
      - ADMIN_KEY=${ADMIN_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
