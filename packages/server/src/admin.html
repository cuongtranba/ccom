<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>inv-server // command post</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  /* Desert palette — oklch */
  --void: oklch(0.12 0.02 65);
  --deep: oklch(0.16 0.025 65);
  --sand: oklch(0.28 0.04 65);
  --sand-dim: oklch(0.22 0.03 65);
  --ridge: oklch(0.38 0.05 65);
  --text: oklch(0.82 0.04 70);
  --text-dim: oklch(0.55 0.03 65);
  --spice: oklch(0.72 0.16 55);
  --spice-bright: oklch(0.82 0.18 55);
  --spice-dim: oklch(0.50 0.10 55);
  --gold: oklch(0.78 0.14 85);
  --gold-dim: oklch(0.55 0.08 85);
  --fremen: oklch(0.62 0.12 250);
  --fremen-dim: oklch(0.42 0.08 250);
  --reject: oklch(0.60 0.18 25);
  --approve: oklch(0.65 0.14 145);
}

html {
  background: var(--void);
  color: var(--text);
  font-family: 'Space Grotesk', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%, oklch(0.18 0.04 55 / 0.4), transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%, oklch(0.15 0.03 45 / 0.3), transparent),
    var(--void);
}

/* ── Shell ─────────────────────────────── */

.shell {
  max-width: 860px;
  margin: 0 auto;
  padding: clamp(2rem, 5vw, 4rem) clamp(1rem, 3vw, 2rem);
}

/* ── Header ────────────────────────────── */

header {
  margin-bottom: 3rem;
}

.mark {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--spice-dim);
  margin-bottom: 0.5rem;
}

h1 {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  line-height: 1.15;
}

h1 span {
  color: var(--spice);
}

.subtitle {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-top: 0.35rem;
}

/* ── Auth gate ─────────────────────────── */

.auth-gate {
  margin-bottom: 2.5rem;
  padding: 1.25rem 1.5rem;
  background: var(--deep);
  border-left: 2px solid var(--sand);
  display: flex;
  gap: 0.75rem;
  align-items: flex-end;
}

.auth-gate.authed {
  border-left-color: var(--approve);
}

.auth-gate label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  display: block;
  margin-bottom: 0.35rem;
}

.auth-gate .field {
  flex: 1;
}

.auth-gate input {
  width: 100%;
  background: var(--void);
  border: 1px solid var(--sand);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  padding: 0.5rem 0.75rem;
  outline: none;
  transition: border-color 0.2s;
}

.auth-gate input:focus {
  border-color: var(--spice);
}

.auth-gate input::placeholder {
  color: var(--sand);
}

.auth-status {
  font-size: 0.7rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim);
  white-space: nowrap;
  padding-bottom: 0.55rem;
}

.auth-status.ok {
  color: var(--approve);
}

/* ── Metrics ───────────────────────────── */

.metrics-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 1px;
  background: var(--sand-dim);
  margin-bottom: 3rem;
}

.metric {
  background: var(--deep);
  padding: 1rem 1.25rem;
}

.metric-val {
  font-size: 1.6rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--spice);
  line-height: 1.1;
}

.metric-val.zero {
  color: var(--sand);
}

.metric-label {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 0.3rem;
}

/* ── Sections ──────────────────────────── */

section {
  margin-bottom: 3rem;
}

.section-head {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dim);
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--sand-dim);
  margin-bottom: 1.25rem;
}

/* ── Token create form ─────────────────── */

.create-form {
  display: flex;
  gap: 0.75rem;
  align-items: flex-end;
  margin-bottom: 1.5rem;
}

.create-form .field {
  flex: 1;
}

.create-form label {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  display: block;
  margin-bottom: 0.3rem;
}

.create-form input {
  width: 100%;
  background: var(--void);
  border: 1px solid var(--sand);
  color: var(--text);
  font-family: 'Space Grotesk', system-ui;
  font-size: 0.85rem;
  padding: 0.5rem 0.75rem;
  outline: none;
  transition: border-color 0.2s;
}

.create-form input:focus {
  border-color: var(--spice);
}

.create-form input::placeholder {
  color: var(--sand);
}

/* ── Buttons ───────────────────────────── */

.btn {
  font-family: 'Space Grotesk', system-ui;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  padding: 0.55rem 1.25rem;
  transition: background 0.15s, color 0.15s, opacity 0.15s;
  white-space: nowrap;
}

.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-spice {
  background: var(--spice);
  color: var(--void);
}

.btn-spice:hover:not(:disabled) {
  background: var(--spice-bright);
}

.btn-danger {
  background: transparent;
  color: var(--reject);
  border: 1px solid var(--reject);
  padding: 0.3rem 0.75rem;
  font-size: 0.65rem;
}

.btn-danger:hover:not(:disabled) {
  background: var(--reject);
  color: var(--void);
}

/* ── Token list ────────────────────────── */

.token-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--sand-dim);
}

.token-row {
  display: grid;
  grid-template-columns: 1fr 1fr auto auto;
  gap: 1rem;
  align-items: center;
  background: var(--deep);
  padding: 0.75rem 1rem;
}

.token-row .node-id {
  font-weight: 600;
  color: var(--text);
}

.token-row .created {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-dim);
}

.token-row .token-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--sand);
  cursor: pointer;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.15s;
}

.token-row .token-val:hover {
  color: var(--spice);
}

.empty-state {
  padding: 2rem;
  text-align: left;
  color: var(--text-dim);
  font-size: 0.85rem;
  background: var(--deep);
}

/* ── Result toast ──────────────────────── */

.result {
  margin-top: 1rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  padding: 0.75rem 1rem;
  background: var(--deep);
  border-left: 2px solid var(--approve);
  color: var(--text);
  word-break: break-all;
  animation: fadeIn 0.2s ease-out;
}

.result.error {
  border-left-color: var(--reject);
  color: var(--reject);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Responsive ────────────────────────── */

@media (max-width: 640px) {
  .create-form {
    flex-direction: column;
    align-items: stretch;
  }
  .token-row {
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }
  .token-row .token-val { display: none; }
  .auth-gate { flex-direction: column; align-items: stretch; }
  .auth-status { padding-bottom: 0; }
}

/* ── Pulse ─────────────────────────────── */

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.pulse {
  animation: pulse 2s ease-in-out infinite;
}
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="mark">Spacing Guild Console</div>
    <h1>inv-server <span>command post</span></h1>
    <div class="subtitle">Token management and signal monitoring</div>
  </header>

  <!-- Auth -->
  <div class="auth-gate" id="authGate">
    <div class="field">
      <label>Admin Key</label>
      <input type="password" id="adminKey" placeholder="Enter ADMIN_KEY to authenticate" autocomplete="off">
    </div>
    <div class="auth-status" id="authStatus">not authenticated</div>
  </div>

  <!-- Metrics -->
  <div class="metrics-strip" id="metrics">
    <div class="metric"><div class="metric-val zero" id="m-active">--</div><div class="metric-label">Active</div></div>
    <div class="metric"><div class="metric-val zero" id="m-routed">--</div><div class="metric-label">Routed</div></div>
    <div class="metric"><div class="metric-val zero" id="m-enqueued">--</div><div class="metric-label">Enqueued</div></div>
    <div class="metric"><div class="metric-val zero" id="m-cross">--</div><div class="metric-label">Cross-Instance</div></div>
    <div class="metric"><div class="metric-val zero" id="m-drains">--</div><div class="metric-label">Drains</div></div>
    <div class="metric"><div class="metric-val zero" id="m-drained">--</div><div class="metric-label">Drained Msgs</div></div>
  </div>

  <!-- Token create -->
  <section>
    <div class="section-head">Issue Credential</div>
    <form class="create-form" id="createForm">
      <div class="field">
        <label>Project</label>
        <input type="text" id="cProject" placeholder="e.g. clinic-checkin" required>
      </div>
      <div class="field">
        <label>Node ID</label>
        <input type="text" id="cNode" placeholder="e.g. dev-node" required>
      </div>
      <button type="submit" class="btn btn-spice" id="createBtn" disabled>Create</button>
    </form>
    <div id="createResult"></div>
  </section>

  <!-- Token list -->
  <section>
    <div class="section-head">Active Credentials</div>
    <form class="create-form" id="listForm" style="margin-bottom:1rem">
      <div class="field">
        <label>Project</label>
        <input type="text" id="lProject" placeholder="Project to list" required>
      </div>
      <button type="submit" class="btn btn-spice" id="listBtn" disabled>Load</button>
    </form>
    <div id="tokenList"></div>
  </section>

</div>

<script>
const $ = (s) => document.getElementById(s);

let adminKey = localStorage.getItem('inv_admin_key') || '';
const keyInput = $('adminKey');
const authGate = $('authGate');
const authStatus = $('authStatus');

if (adminKey) {
  keyInput.value = adminKey;
  setAuthed(true);
}

keyInput.addEventListener('input', () => {
  adminKey = keyInput.value.trim();
  if (adminKey) {
    localStorage.setItem('inv_admin_key', adminKey);
    setAuthed(true);
  } else {
    localStorage.removeItem('inv_admin_key');
    setAuthed(false);
  }
});

function setAuthed(yes) {
  authGate.classList.toggle('authed', yes);
  authStatus.textContent = yes ? 'ready' : 'not authenticated';
  authStatus.classList.toggle('ok', yes);
  $('createBtn').disabled = !yes;
  $('listBtn').disabled = !yes;
}

function headers() {
  return {
    'Authorization': `Bearer ${adminKey}`,
    'Content-Type': 'application/json',
  };
}

// ── Metrics polling ───────────────────────

async function refreshMetrics() {
  try {
    const r = await fetch('/metrics');
    const m = await r.json();
    setMetric('m-active', m.connections_active);
    setMetric('m-routed', m.messages_routed);
    setMetric('m-enqueued', m.messages_enqueued);
    setMetric('m-cross', m.messages_cross_instance);
    setMetric('m-drains', m.drains_total);
    setMetric('m-drained', m.drain_messages_total);
  } catch { /* ignore */ }
}

function setMetric(id, val) {
  const el = $(id);
  const prev = el.textContent;
  el.textContent = val;
  el.classList.toggle('zero', val === 0);
  if (prev !== '--' && prev !== String(val)) {
    el.classList.add('pulse');
    setTimeout(() => el.classList.remove('pulse'), 2000);
  }
}

refreshMetrics();
setInterval(refreshMetrics, 3000);

// ── Token create ──────────────────────────

$('createForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const project = $('cProject').value.trim();
  const nodeId = $('cNode').value.trim();
  if (!project || !nodeId) return;

  $('createBtn').disabled = true;
  const result = $('createResult');

  try {
    const r = await fetch('/api/token/create', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ project, nodeId }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed');
    result.innerHTML = `<div class="result">Token created for <strong>${nodeId}</strong> — click to copy<br><span style="color:var(--spice);cursor:pointer" onclick="navigator.clipboard.writeText('${data.token}').then(()=>this.textContent='copied!')">${data.token}</span></div>`;
    $('cProject').value = '';
    $('cNode').value = '';
  } catch (err) {
    result.innerHTML = `<div class="result error">${err.message}</div>`;
  } finally {
    $('createBtn').disabled = false;
  }
});

// ── Token list ────────────────────────────

$('listForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const project = $('lProject').value.trim();
  if (!project) return;

  $('listBtn').disabled = true;
  const list = $('tokenList');

  try {
    const r = await fetch(`/api/token/list?project=${encodeURIComponent(project)}`, {
      headers: headers(),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed');

    if (data.tokens.length === 0) {
      list.innerHTML = '<div class="empty-state">No credentials issued for this project yet.</div>';
      return;
    }

    list.innerHTML = '<div class="token-list">' +
      data.tokens.map(t => `
        <div class="token-row">
          <div class="node-id">${esc(t.nodeId)}</div>
          <div class="created">${new Date(t.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
          <div class="token-val" title="Click to copy" onclick="navigator.clipboard.writeText(this.textContent)">token:hidden</div>
          <button class="btn btn-danger" onclick="revokePrompt('${esc(t.nodeId)}','${encodeURIComponent(project)}',this)">Revoke</button>
        </div>
      `).join('') +
      '</div>';
  } catch (err) {
    list.innerHTML = `<div class="result error">${err.message}</div>`;
  } finally {
    $('listBtn').disabled = false;
  }
});

async function revokePrompt(nodeId, project, btn) {
  if (!confirm(`Revoke credential for ${nodeId}? This disconnects the node immediately.`)) return;
  btn.disabled = true;
  btn.textContent = '...';

  // We need the actual token to revoke. The list endpoint doesn't return tokens (by design).
  // Show a prompt for the token value.
  const token = prompt(`Enter the token for ${nodeId} to revoke it:`);
  if (!token) { btn.disabled = false; btn.textContent = 'Revoke'; return; }

  try {
    const r = await fetch('/api/token/revoke', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ token }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed');
    btn.closest('.token-row').style.opacity = '0.3';
    btn.textContent = 'Revoked';
  } catch (err) {
    alert(err.message);
    btn.disabled = false;
    btn.textContent = 'Revoke';
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
