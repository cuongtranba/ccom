name: Release @inv/node

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build @inv/node
        run: bun run build:node

      - name: Verify build output
        run: |
          test -f packages/node/dist/cli.js || (echo "Build output missing" && exit 1)
          bun packages/node/dist/cli.js bogus 2>&1 | grep -q "Unknown command" || (echo "CLI routing broken" && exit 1)

  release:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @inv/node
        run: bun run build:node

      - name: Determine next version
        id: version
        run: |
          # Get latest @inv/node@ tag, default to 0.1.0 if none exists
          LATEST_TAG=$(git tag -l '@inv/node@*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="0.1.0"
          else
            CURRENT_VERSION="${LATEST_TAG#@inv/node@}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=@inv/node@$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT_VERSION"

      - name: Set package version
        run: |
          cd packages/node
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Publish to GitHub Packages
        run: |
          cd packages/node
          cat > bunfig.toml <<BUNFIG
          [publish]
          registry = "https://npm.pkg.github.com"
          token = "${{ secrets.GITHUB_TOKEN }}"
          BUNFIG
          bun publish

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "@inv/node ${{ steps.version.outputs.version }}"
          generate_release_notes: true
