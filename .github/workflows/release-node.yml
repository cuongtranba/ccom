name: Release @inv/node

on:
  push:
    branches: [main]
    tags: ["@inv/node@*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build @inv/node
        run: bun run build:node

      - name: Verify build output
        run: |
          test -f packages/node/dist/cli.js || (echo "Build output missing" && exit 1)
          bun packages/node/dist/cli.js bogus 2>&1 | grep -q "Unknown command" || (echo "CLI routing broken" && exit 1)

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/@inv/node@')
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @inv/node
        run: bun run build:node

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#@inv/node@}" >> "$GITHUB_OUTPUT"

      - name: Set package version
        run: |
          cd packages/node
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Publish to GitHub Packages
        run: |
          cd packages/node
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
          echo "@inv:registry=https://npm.pkg.github.com" >> .npmrc
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "@inv/node ${{ steps.version.outputs.version }}"
          body: |
            ## Install

            ```bash
            bunx @inv/node init
            ```

            See [README](https://github.com/tini-works/my-inventory#install) for setup instructions.
          generate_release_notes: true
