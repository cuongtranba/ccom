name: Release @tini-works/inv-node

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/node/**"
      - "packages/shared/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/node/**"
      - "packages/shared/**"

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build @tini-works/inv-node
        run: bun run build:node

      - name: Verify build output
        run: |
          test -f packages/node/dist/cli.js || (echo "Build output missing" && exit 1)
          bun packages/node/dist/cli.js bogus 2>&1 | grep -q "Unknown command" || (echo "CLI routing broken" && exit 1)

  release:
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @tini-works/inv-node
        run: bun run build:node

      - name: Determine next version
        id: version
        run: |
          # Get latest inv-node@ tag, default to 0.0.0 if none exists
          LATEST_TAG=$(git tag -l 'inv-node@*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="0.1.0"
          else
            CURRENT_VERSION="${LATEST_TAG#inv-node@}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=inv-node@$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT_VERSION"

      - name: Update package.json version
        run: |
          cd packages/node
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Publish to npm
        run: cd packages/node && bun publish --tolerate-republish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/node/package.json
          git commit -m "chore(node): release ${{ steps.version.outputs.tag }} [skip ci]"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "@tini-works/inv-node ${{ steps.version.outputs.version }}"
          generate_release_notes: true
